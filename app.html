<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Зацеп имеется</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Unbounded:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css?v=630" />
</head>
<body>

  <header class="header scrolled" id="header">
    <div class="wrap nav">
      <span class="logo">
        <img class="logo-mark" src="assets/img/logo-mark.png" alt="Зацеп имеется" />
        <span>Зацеп <span class="accent">имеется</span></span>
      </span>
    </div>
  </header>

  <!-- Экран входа (виден только если открыть вне Telegram) -->
  <div class="auth-screen" id="view-auth">
    <div class="auth-card">
      <h2 style="text-align:center;">Личный кабинет</h2>
      <p class="sub">Откройте эту страницу из бота <b>@zacepfun_bot</b> в Telegram.</p>
      <div id="tg-widget" style="display:flex;justify-content:center;min-height:52px;"></div>
    </div>
  </div>

  <!-- Онбординг -->
  <div class="auth-screen" id="view-onboarding" hidden>
    <div class="auth-card">
      <h2 style="text-align:center;">Прежде чем начать</h2>
      <p class="sub">Для записи на турниры и рейтинга нужен твой покерный ник и телефон.</p>
      <form id="onboardingForm">
        <div class="field"><label for="onbName">Фамилия и имя</label><input type="text" id="onbName" placeholder="например, Иванов Иван" maxlength="100" required /></div>
        <div class="field"><label for="onbNick">Покерный ник</label><input type="text" id="onbNick" placeholder="например, Рейз" maxlength="32" required /></div>
        <div class="field"><label for="onbPhone">Телефон</label><input type="tel" id="onbPhone" placeholder="+7 900 000-00-00" autocomplete="tel" /></div>
        <label class="legal" style="display:flex;gap:10px;align-items:flex-start;text-align:left;cursor:pointer;margin:8px 0 18px;">
          <input type="checkbox" id="onbConsent" style="margin-top:3px;flex:0 0 auto;" />
          <span>Согласен на обработку персональных данных (<a href="consent.html" style="color:var(--accent);">152-ФЗ</a>).</span>
        </label>
        <button type="submit" class="btn btn-primary btn-block">Продолжить</button>
      </form>
    </div>
  </div>

  <!-- Дашборд -->
  <main class="dash active" id="view-dash" hidden></main>

  <script src="assets/js/mask.js?v=630"></script>

  <script src="assets/js/account.js?v=630"></script>
</body>
</html>
